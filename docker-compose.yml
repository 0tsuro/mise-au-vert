services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mav_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - mav_network

  web:
    image: nginx:alpine
    container_name: mav_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mav_network

  db:
    image: mysql:8.0
    container_name: mav_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: miseauvert
      MYSQL_USER: mav_user
      MYSQL_PASSWORD: mav_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mav_db_data:/var/lib/mysql
    networks:
      - mav_network

volumes:
  mav_db_data:

networks:
  mav_network:
